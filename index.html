<!DOCTYPE html>
<html>
<head>
    <title>Interview Preparation Analyzer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Interview Preparation Analyzer</h1>

        <label>Python Score</label>
        <input type="number" id="python" placeholder="Enter Python Score">

        <label>DSA Score</label>
        <input type="number" id="dsa" placeholder="Enter DSA Score">

        <label>SQL Score</label>
        <input type="number" id="sql" placeholder="Enter SQL Score">

        <button onclick="analyzeSkills()">Analyze</button>
	<button onclick="resetForm()">Reset</button>

        <h2 id="result"></h2>
	<h3 id="average"></h3>
	<h3 id="level"></h3>
	<h4 id="suggestion"></h4>
	<p id="footer">Built using HTML|CSS|JavaScript</p>

    </div>

    <script src="script.js"></script>

</body>
</html>
